name: Sync Reconciliation Tracker

on:
  workflow_dispatch:
  # Operational logs now live in the private Bookkeeping-clients repo, so this
  # workflow can no longer trigger on pushes to log files in this repo.
  # It runs on a schedule and can be triggered manually or cross-repo
  # (repository_dispatch) after a reconciliation run pushes updated logs.
  repository_dispatch:
    types: [logs-updated]
  schedule:
    - cron: "0 */2 * * *"

jobs:
  sync:
    name: Update Google Sheet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clone Bookkeeping-clients
        env:
          PAT_BOOKKEEPING: ${{ secrets.PAT_BOOKKEEPING }}
        run: |
          git clone "https://x-access-token:${PAT_BOOKKEEPING}@github.com/sarah-levine/Bookkeeping-clients.git" /tmp/Bookkeeping-clients
          echo "BOOKKEEPING_CLIENTS_DIR=/tmp/Bookkeeping-clients" >> $GITHUB_ENV
          python3 -c "import json; d=json.load(open('/tmp/Bookkeeping-clients/sheets_config.json')); print('sheet_name:', d.get('sheet_name')); print('cells:', len(d.get('cell_map', {})))"

      - name: Write private config
        env:
          DIGEST_CONFIG: ${{ secrets.DIGEST_CONFIG }}
        run: |
          if [ -n "$DIGEST_CONFIG" ]; then
            echo "$DIGEST_CONFIG" > digest_config.json
          fi

      - name: Write credentials
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: echo "$GOOGLE_SHEETS_CREDENTIALS" > credentials.json

      - name: Sync sheet
        id: sync
        continue-on-error: true
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          BOOKKEEPING_CLIENTS_DIR: /tmp/Bookkeeping-clients
        run: python3 -u sheets_updater.py --backfill

      - name: Alert on failure
        if: steps.sync.outcome == 'failure'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python3 alert_failure.py "Reconciliation Tracker Sheet Update FAILED"
